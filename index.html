<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TODO App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container mt-5" style="max-width: 600px;">
    <h1 class="mb-4 text-center text-primary">Мій Список Справ</h1>
    
    <div class="card p-4 shadow-sm mb-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <span class="me-3 fw-bold">Всього справ: <span id="item-count" class="badge bg-primary">0</span></span>
          <span class="fw-bold">Незроблених: <span id="unchecked-count" class="badge bg-warning text-dark">0</span></span>
        </div>
        <button class="btn btn-success" onClick="newTodo()">Додати справу +</button>
      </div>
      
      <ul id="todo-list" class="list-group"></ul>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
